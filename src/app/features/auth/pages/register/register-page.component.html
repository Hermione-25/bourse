<div>
  <h1 class="text-2xl font-bold text-dark mb-6 text-center">Inscription</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-bold uppercase tracking-[1px] text-dark mb-2" for="first_name">Nom <span class="text-red-500">*</span></label>
        <input id="first_name" type="text" formControlName="first_name" class="w-full rounded-lg border border-border-color px-4 py-2 text-sm text-dark focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-light/50" placeholder="Doe" />
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-[1px] text-dark mb-2" for="last_name">Prénom <span class="text-red-500">*</span></label>
        <input id="last_name" type="text" formControlName="last_name" class="w-full rounded-lg border border-border-color px-4 py-2 text-sm text-dark focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-light/50" placeholder="John" />
      </div>

    <div>
      <label class="block text-xs font-bold uppercase tracking-[1px] text-dark mb-2" for="email">Email <span class="text-red-500">*</span></label>
      <input id="email" type="email" formControlName="email" class="w-full rounded-lg border border-border-color px-4 py-2 text-sm text-dark focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-light/50" placeholder="votre@email.com" />
    </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-[1px] text-dark mb-2" for="country">Votre pays</label>
        <select name="country" id="country" formControlName="country" class="w-full rounded-lg border border-border-color px-4 py-2 text-sm text-dark focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-light/50 appearance-none">
          <option >Sélectionnez</option>
          <option *ngFor="let pays of countries" [value]="pays.id">{{ pays.name }}</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-xs font-bold uppercase tracking-[1px] text-dark mb-2" for="password">Mot de passe <span class="text-red-500">*</span></label>
      <input id="password" type="password" formControlName="password" class="w-full rounded-lg border border-border-color px-4 py-2 text-sm text-dark focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-light/50" placeholder="••••••••" />
    </div>

    <div>
      <label class="block text-xs font-bold uppercase tracking-[1px] text-dark mb-2" for="passwordConfirmation">Confirmer le mot de passe <span class="text-red-500">*</span></label>
      <input id="passwordConfirmation" type="password" formControlName="passwordConfirmation" class="w-full rounded-lg border border-border-color px-4 py-2 text-sm text-dark focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-light/50" placeholder="••••••••" />
    </div>

    <div *ngIf="errorMessage" class="text-xs text-red-600 bg-red-50 p-3 rounded-lg border border-red-100">{{ errorMessage }}</div>

    <button type="submit" class="w-full mt-2 inline-flex items-center justify-center px-5 py-3 rounded-lg text-sm font-semibold cursor-pointer transition-all duration-300 border-none no-underline bg-primary text-white shadow-[0_4px_12px] shadow-primary/20 hover:opacity-90 hover:-translate-y-[1px]" [disabled]="submitting">
      {{ submitting ? 'Inscription en cours...' : 'Créer mon compte' }}
    </button>
  </form>

  <p class="text-center text-xs text-light mt-6">
    Vous avez déjà un compte ? 
    <a routerLink="/auth/login" class="text-primary font-semibold no-underline hover:underline">Connectez-vous</a>
  </p>
</div>
