<div class="max-w-sm mx-auto p-4">
  <h1 class="text-2xl font-semibold mb-4">Mot de passe oublié</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
    <div>
      <label class="block text-xs font-bold uppercase tracking-[1px] text-dark mb-2" for="email">Email</label>
      <input id="email" type="email" formControlName="email" class="w-full rounded-lg border border-border-color px-4 py-2 text-sm text-dark focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-light/50" />
    </div>

    <div *ngIf="successMessage" class="text-green-600">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="text-red-600">{{ errorMessage }}</div>

    <button type="submit" class="w-full mt-2 inline-flex items-center justify-center px-5 py-3 rounded-lg text-sm font-semibold cursor-pointer transition-all duration-300 border-none no-underline bg-primary text-white shadow-[0_4px_12px] shadow-primary/20 hover:opacity-90 hover:-translate-y-[1px]" [disabled]="submitting">
      {{ submitting ? 'Envoi...' : 'Envoyer le lien' }}
    </button>
  </form>
</div>
