<section class="p-4">
  <h1 class="text-2xl font-semibold mb-4">Bourses</h1>

  <div *ngIf="loading" class="text-gray-600">Chargement...</div>
  <div *ngIf="errorMessage" class="text-red-600">{{ errorMessage }}</div>

  <div *ngIf="!loading && scholarships.length === 0" class="text-gray-500">Aucune bourse trouvée.</div>

  <ul class="space-y-4">
    <li *ngFor="let scholarship of scholarships" class="p-4 border rounded shadow-sm">
      <h2 class="text-xl font-semibold">{{ scholarship.title }}</h2>
      <p class="text-sm text-gray-600">{{ scholarship.universityName }} • {{ scholarship.location || 'En ligne' }}</p>
      <p class="mt-2 text-gray-700">{{ scholarship.description }}</p>
      <p class="mt-2 text-sm text-slate-500">Date limite : {{ scholarship.deadline | date }}</p>
    </li>
  </ul>
</section>
