<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center bg-black/30 p-4">
  <div class="w-full max-w-lg rounded bg-white p-6 shadow-lg">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-semibold">{{ title }}</h2>
      <button type="button" class="text-slate-500" (click)="close.emit()">✕</button>
    </div>
    <ng-content></ng-content>
  </div>
</div>
